<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quieres ser mi novia, Heidi?</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2.8rem;
      text-align: center;
      color: #ffb6f9;
      text-shadow: 0 0 20px #ff33cc, 0 0 40px #ff0099;
      margin-bottom: 50px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      position: relative;
    }

    button {
      padding: 15px 40px;
      font-size: 1.3rem;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #yesBtn {
      background: linear-gradient(90deg, #ff66cc, #ff0099);
      color: white;
      box-shadow: 0 0 25px #ff33cc;
    }

    #yesBtn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 35px #ff66ff;
    }

    #noBtn {
      background: linear-gradient(90deg, #6666ff, #cc33ff);
      color: white;
      position: absolute;
    }

    .heart {
      position: absolute;
      color: #ff66cc;
      font-size: 20px;
      animation: float 6s linear infinite;
      opacity: 0.6;
      pointer-events: none;
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-800px) scale(1.6);
        opacity: 0;
      }
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
    }

    .modal h2 {
      font-size: 2.5rem;
      color: #ffb6f9;
      text-shadow: 0 0 30px #ff33cc, 0 0 50px #ff00c8;
      animation: pop 0.8s ease;
      text-align: center;
      padding: 20px;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>¿Quieres ser mi novia, Heidi?</h1>
  <div class="buttons">
    <button id="yesBtn">Sí 💖</button>
    <button id="noBtn">No 😜</button>
  </div>

  <div class="modal" id="modal">
    <h2>💍 ¡Listo Heidi, ya te amarré 😎💘!</h2>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const modal = document.getElementById('modal');

    yesBtn.addEventListener('click', () => {
      modal.classList.add('show');
      for (let i = 0; i < 40; i++) {
        createHeart();
      }
    });

    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - noBtn.clientWidth - 50);
      const y = Math.random() * (window.innerHeight - noBtn.clientHeight - 50);
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = '💖';
      document.body.appendChild(heart);
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.top = '100vh';
      heart.style.fontSize = Math.random() * 25 + 15 + 'px';
      const duration = Math.random() * 3 + 4;
      heart.style.animationDuration = duration + 's';

      setTimeout(() => heart.remove(), duration * 1000);
    }

    setInterval(createHeart, 700);
  </script>
</body>
</html>
